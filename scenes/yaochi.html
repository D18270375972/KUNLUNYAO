<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瑶池赋 · 昆仑谣</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #f5f0e6; cursor: crosshair; user-select: none; }
  canvas { display: block; width: 100%; height: 100%; }
  .yaochi-title {
    position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
    pointer-events: none; z-index: 10; text-align: center;
    animation: titleFloat 6s ease-in-out infinite;
  }
  .yaochi-title .main {
    font-size: clamp(28px, 5vw, 56px);
    color: #6b5a4a; letter-spacing: 0.3em;
    text-shadow: 0 0 30px rgba(180,160,140,0.3); font-weight: normal;
    font-family: "STKaiti", "KaiTi", "楷体", "FangSong", "仿宋", serif;
  }
  .yaochi-title .sub {
    font-size: clamp(12px, 1.5vw, 18px);
    color: #9b8a7a; letter-spacing: 0.5em; margin-top: 4px; opacity: 0.7;
    font-family: "STKaiti", "KaiTi", "楷体", "FangSong", "仿宋", serif;
  }
  @keyframes titleFloat {
    0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.85; }
    50% { transform: translateX(-50%) translateY(-8px); opacity: 1; }
  }
  .yaochi-hint {
    position: absolute; bottom: 6%; left: 50%; transform: translateX(-50%);
    pointer-events: none; z-index: 10;
    font-size: 13px; color: #9b8a7a; opacity: 0.5; letter-spacing: 0.2em;
    animation: hintPulse 4s ease-in-out infinite;
    font-family: "STKaiti", "KaiTi", "楷体", "FangSong", "仿宋", serif;
  }
  @keyframes hintPulse { 0%,100% { opacity:0.3; } 50% { opacity:0.6; } }
  /* NPC 对话提示 */
  .npc-dialog-hint {
    position: absolute; bottom: 13%; left: 50%; transform: translateX(-50%);
    z-index: 20; pointer-events: none;
    padding: 6px 18px; border-radius: 999px;
    background: rgba(107,90,74,0.75); color: #E8D0A0;
    font-size: 13px; letter-spacing: 0.18em;
    border: 1px solid rgba(212,168,83,0.3);
    backdrop-filter: blur(4px);
    opacity: 0; animation: npcHintFade 6s ease-in-out 1.5s forwards;
    font-family: "STKaiti", "KaiTi", "楷体", "FangSong", "仿宋", serif;
  }
  @keyframes npcHintFade {
    0% { opacity: 0; transform: translateX(-50%) translateY(8px); }
    15% { opacity: 1; transform: translateX(-50%) translateY(0); }
    75% { opacity: 1; }
    100% { opacity: 0; }
  }
  .npc-click-zone {
    position: absolute; z-index: 15; cursor: pointer;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,168,83,0.08) 0%, transparent 70%);
    transition: background .3s;
  }
  .npc-click-zone:hover {
    background: radial-gradient(circle, rgba(212,168,83,0.18) 0%, transparent 70%);
  }
  .npc-click-zone::after {
    content: ''; position: absolute; inset: 10%; border-radius: 50%;
    border: 1.5px dashed rgba(212,168,83,0.25);
    animation: npcRing 3s ease-in-out infinite;
  }
  @keyframes npcRing {
    0%,100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.1); opacity: 0.6; }
  }
  /* ★ 五色瑶池弹窗 */
  .wuse-dialog {
    position: absolute; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: rgba(30,25,20,0.55); backdrop-filter: blur(6px);
    animation: wuseFadeIn 0.8s ease-out;
  }
  .wuse-dialog.hidden { display: none; }
  @keyframes wuseFadeIn { from { opacity:0; } to { opacity:1; } }
  .wuse-card {
    background: linear-gradient(135deg, rgba(60,50,40,0.92), rgba(45,38,30,0.95));
    border: 1.5px solid rgba(212,168,83,0.4); border-radius: 16px;
    padding: 32px 40px; text-align: center; max-width: 420px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    animation: wuseCardIn 0.6s ease-out 0.2s both;
  }
  @keyframes wuseCardIn { from { opacity:0; transform:translateY(20px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
  .wuse-card h2 {
    color: #E8D0A0; font-size: 24px; letter-spacing: 0.25em; margin-bottom: 12px;
    font-family: "STKaiti", "KaiTi", "楷体", serif; font-weight: normal;
    text-shadow: 0 0 20px rgba(212,168,83,0.3);
  }
  .wuse-card p {
    color: #C0AA88; font-size: 14px; line-height: 1.8; letter-spacing: 0.1em; margin-bottom: 24px;
    font-family: "STKaiti", "KaiTi", "楷体", serif;
  }
  .wuse-btns { display: flex; gap: 16px; justify-content: center; }
  .wuse-btn {
    padding: 10px 28px; border-radius: 8px; font-size: 15px; cursor: pointer;
    letter-spacing: 0.15em; transition: all 0.3s;
    font-family: "STKaiti", "KaiTi", "楷体", serif;
  }
  .wuse-btn-yes {
    background: linear-gradient(135deg, #8B6914, #C49520); color: #FFF8E0;
    border: 1px solid rgba(212,168,83,0.5);
    box-shadow: 0 2px 12px rgba(196,149,32,0.3);
  }
  .wuse-btn-yes:hover { background: linear-gradient(135deg, #A07818, #D4A528); transform: translateY(-1px); }
  .wuse-btn-no {
    background: rgba(80,70,60,0.6); color: #A89880;
    border: 1px solid rgba(160,140,120,0.3);
  }
  .wuse-btn-no:hover { background: rgba(90,80,70,0.7); }
  /* ★ 五色手势提示面板 */
  .wuse-guide {
    position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
    z-index: 90; pointer-events: none; text-align: center;
    animation: wuseGuideIn 1s ease-out;
  }
  .wuse-guide.hidden { display: none; }
  @keyframes wuseGuideIn { from { opacity:0; transform:translateX(-50%) translateY(-15px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  .wuse-guide-inner {
    background: rgba(50,42,35,0.82); border: 1px solid rgba(212,168,83,0.3);
    border-radius: 12px; padding: 14px 28px; backdrop-filter: blur(4px);
  }
  .wuse-guide-inner h3 {
    color: #E8D0A0; font-size: 16px; letter-spacing: 0.2em; margin-bottom: 8px;
    font-family: "STKaiti", "KaiTi", "楷体", serif; font-weight: normal;
  }
  .wuse-guide-inner p {
    color: #B8A888; font-size: 12px; letter-spacing: 0.1em; line-height: 1.8;
    font-family: "STKaiti", "KaiTi", "楷体", serif;
  }
  /* ★ 五色指示器 */
  .wuse-indicator {
    position: absolute; bottom: 14%; left: 50%; transform: translateX(-50%);
    z-index: 90; text-align: center;
    animation: wuseIndIn 0.6s ease-out;
  }
  .wuse-indicator.hidden { display: none; }
  @keyframes wuseIndIn { from { opacity:0; } to { opacity:1; } }
  .wuse-ind-dots { display: flex; gap: 14px; align-items: center; pointer-events: auto; }
  .wuse-dot {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
    transition: all 0.5s; opacity: 0.4; cursor: pointer; pointer-events: auto;
  }
  .wuse-dot:hover { opacity: 0.7; transform: scale(1.1); }
  .wuse-dot.active { border-color: rgba(255,255,255,0.8); opacity: 1; transform: scale(1.25); box-shadow: 0 0 15px currentColor; }
  .wuse-label {
    color: #E8D0A0; font-size: 16px; letter-spacing: 0.3em; margin-top: 8px;
    font-family: "STKaiti", "KaiTi", "楷体", serif;
    text-shadow: 0 0 10px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="yaochi-title">
  <h1 class="main">瑶 池 赋</h1>
  <p class="sub">昆 仑 仙 境 · 瑶 池 胜 境</p>
</div>
<div class="yaochi-hint">移动鼠标游观仙境 · 点击场景任意处与西王母对话</div>
<div class="npc-click-zone" id="npcZone" style="bottom:8%;right:15%;width:160px;height:180px;transform:translate(50%,0)">
  <div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);white-space:nowrap;color:rgba(212,168,83,.55);font-size:13px;letter-spacing:.15em;font-family:STKaiti,KaiTi,楷体,serif;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.2)">👸 西王母</div>
</div>
<div class="npc-dialog-hint">👆 点击此处与西王母对话</div>
<!-- ★ 五色瑶池确认弹窗 -->
<div class="wuse-dialog" id="wuseDialog">
  <div class="wuse-card">
    <h2>✦ 五色瑶池 ✦</h2>
    <p>西王母执掌昆仑瑶池，池水可化为五色，对应五行之力。<br>是否开启五色瑶池？</p>
    <div class="wuse-btns">
      <button class="wuse-btn wuse-btn-yes" id="wuseYes">开启五色</button>
      <button class="wuse-btn wuse-btn-no" id="wuseNo">暂不开启</button>
    </div>
  </div>
</div>
<!-- ★ 五色手势指引 -->
<div class="wuse-guide hidden" id="wuseGuide">
  <div class="wuse-guide-inner">
    <h3>✦ 五色瑶池 ✦</h3>
    <p>左右滑动掌换五行 · 底部圆点亦可点选<br>金·月华  木·青墨  水·澄碧  火·烟霞  土·蜜金</p>
  </div>
</div>
<!-- ★ 五色指示器 -->
<div class="wuse-indicator hidden" id="wuseIndicator">
  <div class="wuse-ind-dots" id="wuseDots"></div>
  <div class="wuse-label" id="wuseLabel">翠</div>
</div>
<script>
(function(){
  // ═══════════════════════════════════════════════════════════
  //  ★ 五色瑶池系统
  // ═══════════════════════════════════════════════════════════
  var WUSE_MODE = false;        // 是否开启五色模式
  var WUSE_IDX = 1;             // 当前五色索引 0-4
  var WUSE_TRANSITION = 0;      // 过渡进度 0-1
  var WUSE_TARGET = 1;          // 目标索引
  var WUSE_SWIPE_START = null;  // 滑动起点

  // ★ 五色配置——五彩池风格「流光溢彩」
  // 核心原理：每色 = 主色相 + 副色相 + 流光色 + 流动色带 + 彩色光点 + 彩虹微注 = 丰富多彩的池水
  // 新增属性：waterAlt(副色), shimmerHue(流光色)
  //           flowColors(6色流动色带·含彩虹色), colorDots(7色彩色光点·含赤橙黄绿青蓝紫)
  //           rainbowTint(7色彩虹微注·极淡的赤橙黄绿青蓝紫点)
  var WUSE_COLORS = [
    // ═════════ 金 · 月华 ═════════
    { name:'月华', char:'金', element:'Metal', accent:'#8EA8BE',
      // 月光冷蓝 → 暖米金，银辉带金，点缀淡紫与琥珀
      waterNear:[192,212,228],   waterMid:[168,195,218],
      waterFar:[142,172,205],   waterDeep:[108,142,178],
      waterSurf:[208,225,238],   waterAlt:[218,205,182],
      shimmerHue:[228,215,182],
      // ★ 6色流动色带：在主色基调上注入更多色彩
      flowColors:[[195,175,210],[210,195,165],[175,200,218],[220,205,190],[200,180,200],[185,210,205]],
      // ★ 7色彩色光点：赤·橙·黄·绿·青·蓝·紫的淡彩版
      colorDots:[[220,170,160],[225,195,155],[225,215,165],[175,215,170],[160,205,210],[165,180,220],[195,170,215]],
      // ★ 7色彩虹微注：极淡的矿物色彩渗透
      rainbowTint:[[230,185,175],[235,205,170],[240,225,180],[185,230,185],[175,225,225],[180,195,235],[205,180,225]],
      mountainNear:[190,205,222],mountainMid:[175,192,215],
      mountainFar:[158,178,202],mountainBack:[140,160,188],
      skyTop:[244,248,252], skyBot:[232,242,250],
      caustic:[205,222,238], sparkle:[228,238,248],
      particle:[192,208,228], petal:[215,205,185],
      glow:[222,235,248] },

    // ═════════ 木 · 青墨 ═════════
    { name:'青墨', char:'木', element:'Wood', accent:'#7BA898',
      // 青绿 → 碧蓝，翡翠深潭
      waterNear:[172,218,198],   waterMid:[148,198,182],
      waterFar:[122,175,165],   waterDeep:[88,148,138],
      waterSurf:[192,228,212],   waterAlt:[138,182,198],
      shimmerHue:[188,228,205],
      flowColors:[[155,195,175],[130,180,200],[175,200,155],[165,185,195],[145,190,180],[180,195,200]],
      colorDots:[[215,175,165],[220,195,155],[218,210,160],[150,218,155],[145,210,210],[155,175,215],[195,168,208]],
      rainbowTint:[[225,190,180],[230,205,170],[235,220,175],[165,230,170],[158,222,222],[168,188,228],[205,182,220]],
      mountainNear:[168,208,192],mountainMid:[152,192,178],
      mountainFar:[135,178,165],mountainBack:[118,160,148],
      skyTop:[238,246,242], skyBot:[225,238,232],
      caustic:[162,212,192], sparkle:[192,230,215],
      particle:[148,205,182], petal:[178,210,172],
      glow:[205,232,218] },

    // ═════════ 水 · 澄碧 ═════════
    { name:'澄碧', char:'水', element:'Water', accent:'#6CAABF',
      // 湖蓝 → 紫罗兰，冰湖深处紫意
      waterNear:[178,208,228],   waterMid:[152,188,218],
      waterFar:[125,165,202],   waterDeep:[92,138,178],
      waterSurf:[198,222,238],   waterAlt:[178,168,198],
      shimmerHue:[192,218,238],
      flowColors:[[170,160,200],[185,200,220],[160,185,210],[195,175,195],[180,168,215],[172,195,208]],
      colorDots:[[218,172,165],[222,190,155],[215,208,162],[158,208,160],[150,200,208],[160,175,218],[200,170,210]],
      rainbowTint:[[228,188,178],[232,200,168],[238,218,172],[170,225,172],[162,218,218],[175,188,232],[210,185,222]],
      mountainNear:[182,208,232],mountainMid:[165,192,222],
      mountainFar:[148,175,210],mountainBack:[128,158,195],
      skyTop:[240,245,252], skyBot:[225,238,250],
      caustic:[188,218,242], sparkle:[215,232,248],
      particle:[178,205,232], petal:[192,180,210],
      glow:[208,228,248] },

    // ═════════ 火 · 烟霞 ═════════
    { name:'烟霞', char:'火', element:'Fire', accent:'#B8989E',
      // 烟粉 → 暖米，晨雾朝霞
      waterNear:[222,205,210],   waterMid:[202,185,195],
      waterFar:[178,162,175],   waterDeep:[148,132,148],
      waterSurf:[232,218,225],   waterAlt:[208,195,170],
      shimmerHue:[228,205,188],
      flowColors:[[210,180,160],[195,175,195],[220,195,175],[185,165,180],[225,185,165],[192,180,192]],
      colorDots:[[228,165,158],[230,185,150],[225,205,160],[165,210,168],[155,200,205],[168,178,218],[205,165,208]],
      rainbowTint:[[238,182,175],[240,198,165],[242,218,175],[178,222,178],[168,215,215],[180,190,228],[215,180,220]],
      mountainNear:[215,205,215],mountainMid:[198,188,200],
      mountainFar:[180,168,182],mountainBack:[158,145,165],
      skyTop:[248,244,246], skyBot:[238,230,236],
      caustic:[228,215,225], sparkle:[240,232,240],
      particle:[218,202,215], petal:[225,198,172],
      glow:[240,230,238] },

    // ═════════ 土 · 蜜金 ═════════
    { name:'蜜金', char:'土', element:'Earth', accent:'#B5A882',
      // 琥珀金 → 青绿，秋阳芦苇
      waterNear:[225,215,192],   waterMid:[205,192,168],
      waterFar:[182,168,140],   waterDeep:[148,135,105],
      waterSurf:[235,225,205],   waterAlt:[155,188,172],
      shimmerHue:[228,218,178],
      flowColors:[[195,185,160],[165,185,170],[210,195,160],[175,170,150],[200,178,165],[185,190,175]],
      colorDots:[[228,178,162],[232,198,152],[230,215,158],[158,215,162],[148,208,205],[162,180,218],[200,175,210]],
      rainbowTint:[[238,195,180],[240,210,165],[245,225,172],[170,228,170],[160,220,218],[175,192,232],[210,188,222]],
      mountainNear:[218,210,195],mountainMid:[202,194,178],
      mountainFar:[185,175,158],mountainBack:[165,155,135],
      skyTop:[250,248,242], skyBot:[242,238,225],
      caustic:[235,225,205], sparkle:[245,238,222],
      particle:[225,212,190], petal:[172,195,175],
      glow:[245,235,215] },
  ];

  // 获取当前插值后的五色配色
  function getWuseColor() {
    var from = WUSE_COLORS[WUSE_IDX];
    var t = WUSE_TRANSITION;
    if (t <= 0) return from;
    var to = WUSE_COLORS[WUSE_TARGET];
    function lerpArr(a, b, t) { return a.map(function(v,i){ return v + (b[i]-v)*t; }); }
    function lerpArr2d(a, b, t) { return a.map(function(v,i){ return lerpArr(v, b[i], t); }); }
    var result = {
      name: t >= 0.5 ? to.name : from.name,
      char: t >= 0.5 ? to.char : from.char,
      element: t >= 0.5 ? to.element : from.element,
      accent: t >= 0.5 ? to.accent : from.accent,
      // 水面近中远
      waterNear: lerpArr(from.waterNear, to.waterNear, t),
      waterMid: lerpArr(from.waterMid, to.waterMid, t),
      waterFar: lerpArr(from.waterFar, to.waterFar, t),
      waterDeep: lerpArr(from.waterDeep, to.waterDeep, t),
      waterSurf: lerpArr(from.waterSurf, to.waterSurf, t),
      waterAlt: lerpArr(from.waterAlt || from.waterDeep, to.waterAlt || to.waterDeep, t),
      shimmerHue: lerpArr(from.shimmerHue || from.sparkle, to.shimmerHue || to.sparkle, t),
      // 流动色带与彩色光点与彩虹微注
      flowColors: lerpArr2d(from.flowColors || [from.waterMid, from.waterAlt, from.waterSurf, from.waterFar, from.waterMid, from.waterAlt],
                            to.flowColors || [to.waterMid, to.waterAlt, to.waterSurf, to.waterFar, to.waterMid, to.waterAlt], t),
      colorDots: lerpArr2d(from.colorDots || [from.sparkle, from.petal, from.caustic, from.waterAlt, from.glow, from.waterSurf, from.waterMid],
                           to.colorDots || [to.sparkle, to.petal, to.caustic, to.waterAlt, to.glow, to.waterSurf, to.waterMid], t),
      rainbowTint: lerpArr2d(from.rainbowTint || [from.sparkle, from.petal, from.caustic, from.waterAlt, from.glow, from.waterSurf, from.waterMid],
                             to.rainbowTint || [to.sparkle, to.petal, to.caustic, to.waterAlt, to.glow, to.waterSurf, to.waterMid], t),
      // 山体近中远背
      mountainNear: lerpArr(from.mountainNear, to.mountainNear, t),
      mountainMid: lerpArr(from.mountainMid, to.mountainMid, t),
      mountainFar: lerpArr(from.mountainFar, to.mountainFar, t),
      mountainBack: lerpArr(from.mountainBack, to.mountainBack, t),
      // 天空
      skyTop: lerpArr(from.skyTop, to.skyTop, t),
      skyBot: lerpArr(from.skyBot, to.skyBot, t),
      // 其他效果色
      caustic: lerpArr(from.caustic, to.caustic, t),
      sparkle: lerpArr(from.sparkle, to.sparkle, t),
      particle: lerpArr(from.particle, to.particle, t),
      petal: lerpArr(from.petal, to.petal, t),
      glow: lerpArr(from.glow, to.glow, t),
    };
    return result;
  }

  function switchWuse(idx) {
    if (idx < 0) idx = 4;
    if (idx > 4) idx = 0;
    if (idx === WUSE_IDX && WUSE_TRANSITION <= 0) return;
    WUSE_TARGET = idx;
    WUSE_TRANSITION = 0;
    // 更新指示器
    updateWuseIndicator(idx);
  }

  function updateWuseIndicator(idx) {
    var dots = document.getElementById('wuseDots');
    var label = document.getElementById('wuseLabel');
    if (!dots || !label) return;
    var colors = WUSE_COLORS;
    dots.innerHTML = '';
    for (var i = 0; i < 5; i++) {
      var dot = document.createElement('div');
      dot.className = 'wuse-dot' + (i === idx ? ' active' : '');
      var c = colors[i].waterMid;
      dot.style.background = 'rgba('+Math.round(c[0])+','+Math.round(c[1])+','+Math.round(c[2])+',0.6)';
      dot.style.color = 'rgba('+Math.round(c[0])+','+Math.round(c[1])+','+Math.round(c[2])+',0.8)';
      // ★ 点击圆点切换对应颜色
      dot.onclick = (function(i){ return function(e){ e.stopPropagation(); switchWuse(i); }; })(i);
      dots.appendChild(dot);
    }
    label.textContent = colors[idx].char + ' · ' + colors[idx].name;
    label.style.color = colors[idx].accent;
  }

  // 五色弹窗逻辑
  document.getElementById('wuseYes').addEventListener('click', function() {
    WUSE_MODE = true;
    document.getElementById('wuseDialog').classList.add('hidden');
    document.getElementById('wuseGuide').classList.remove('hidden');
    document.getElementById('wuseIndicator').classList.remove('hidden');
    updateWuseIndicator(WUSE_IDX);
    // 启动古乐
    startWuseMusic();
    // 5秒后隐藏手势提示
    setTimeout(function(){
      var g = document.getElementById('wuseGuide');
      if (g) g.classList.add('hidden');
    }, 6000);
    // 通知父框架音乐切换

  });

  // ═══════════════════════════════════════════════════════════
  //  音乐律动系统
  // ═══════════════════════════════════════════════════════════
  var _musicBeat = 0;
  var _musicFreq = 261.63;
  var _musicNoteIdx = 0;
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'musicBeat') {
      _musicBeat = 1.0;
